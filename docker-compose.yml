version: '3.9'

services:
    # Service Nginx
    nginx:
            image: nginx:latest
            container_name: ktp-nginx
            restart: always
            ports:
                    - "8089:80"
            volumes:
                    - ./:/var/www
                    - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            depends_on:
                    - app
            networks:
                    - app-network

    # Service PHP
    app:
            build:
                    context: .
            container_name: ktp-app
            restart: always
            volumes:
                    - ./:/var/www
                    - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini
            depends_on:
                    - db
            networks:
                    - app-network

    # Service MySQL
    db:
            image: mysql:5.7
            container_name: ktp-db
            restart: always
            ports:
                    - "33089:3306"
            environment:
                    MYSQL_DATABASE: db_ktp
                    MYSQL_USER: user
                    MYSQL_PASSWORD: password
                    MYSQL_ROOT_PASSWORD: root
            volumes:
                    - mysql_data:/var/lib/mysql
            networks:
                    - app-network

volumes:
        mysql_data:

networks:
        app-network:
                driver: bridge
